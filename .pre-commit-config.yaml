repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (src)
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]

      - id: classifier-regress-stamp
        name: classifier-regress stamp (DEC-13/FR-13 mandatory gate)
        entry: uv run python scripts/check_classifier_regress_stamp.py
        language: system
        files: ^prompts/classifier\.md$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
